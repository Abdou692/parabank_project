name: Parabank Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: python -m behave --format json --outfile rapport.json --no-capture
      continue-on-error: true
    
    - name: Upload report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-report
        path: rapport.json
